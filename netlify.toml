[build]
  command = "npm run build"
  publish = "dist"

# Vite already minifies and bundles everything; skip Netlify's post-processing
[build.processing]
  skip_processing = true

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: all routes served by index.html so client-side routing works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Fingerprinted assets — cache forever (Vite embeds content hashes in filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html must NOT be cached — every deploy should be picked up immediately
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
