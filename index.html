    <title>Lecture-to-Mastery — Study smarter</title>
    <!--
      ── No-FOUC Theme Guard ──────────────────────
      Inline, blocking script that runs BEFORE first paint.
      Reads the persisted mode from localStorage, resolves
      the effective theme (system=auto, light=light, dark=dark),
      and applies both data-theme and class to <html> so there
      is ZERO flash of wrong theme on load or refresh.
      ════════════════════════════════════════════════ -->
    <script>
      (function() {
        var mode = (function() {
          try { return localStorage.getItem('theme-mode'); } catch(e) { return null; }
        })();
        // Default to light. Only switch to dark if user explicitly chose dark.
        var resolved = 'light';
        if (mode === 'dark') {
          resolved = 'dark';
        }
        document.documentElement.setAttribute('data-theme', resolved);
        if (resolved === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
